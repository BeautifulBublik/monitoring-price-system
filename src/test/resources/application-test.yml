spring:
  datasource:
    url: jdbc:h2:mem:pricemonitor;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

price-monitor:
  jwt:
    secret: "test-secret-key-long-enough-for-hs256-algorithm"
    expiration: 1h

  scheduler:
    enabled: false
    cron: "-"

  history:
    store-mode: ON_CHANGE

  selenium:
    enabled: false

  telegram:
    enabled: false

  mail:
    enabled: false

  default-rule:
    price-selector: "[itemprop=price]"
    title-selector: "h1"
    currency: RUB
    render-mode: AUTO
