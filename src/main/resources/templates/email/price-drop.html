<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Price dropped</title>
</head>
<body style="margin:0;padding:24px;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#1f2933;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
       style="max-width:520px;margin:0 auto;background:#ffffff;border-radius:8px;padding:24px;">
    <tr>
        <td>
            <h1 style="margin:0 0 16px;font-size:20px;">Price dropped 🎉</h1>

            <p style="margin:0 0 8px;font-size:16px;font-weight:bold;" th:text="${title}">
                Product name
            </p>
            <p style="margin:0 0 16px;font-size:13px;color:#7b8794;" th:text="${shop}">
                Shop
            </p>

            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 16px;">
                <tr>
                    <td style="padding-right:16px;font-size:15px;color:#7b8794;text-decoration:line-through;">
                        <span th:text="${oldPrice}">100000.00</span>
                        <span th:text="${currency}">UAH</span>
                    </td>
                    <td style="font-size:22px;font-weight:bold;color:#0b8043;">
                        <span th:text="${newPrice}">89990.00</span>
                        <span th:text="${currency}">UAH</span>
                    </td>
                </tr>
            </table>

            <p style="margin:0 0 24px;font-size:14px;">
                You save:
                <strong>
                    <span th:text="${absoluteDrop}">10010.00</span>
                    <span th:text="${currency}">UAH</span>
                </strong>
                (<span th:text="${percentDrop}">10.0</span>%)
            </p>

            <a th:href="${url}" href="#"
               style="display:inline-block;padding:12px 20px;background:#1a73e8;color:#ffffff;
                      text-decoration:none;border-radius:6px;font-size:15px;">
                Open product
            </a>

            <p style="margin:24px 0 0;font-size:12px;color:#9aa5b1;">
                You received this email because you are tracking a product in Price Monitor.
                You can turn off notifications in your profile settings.
            </p>
        </td>
    </tr>
</table>

</body>
</html>
